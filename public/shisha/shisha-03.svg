<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Placeholder — close-up of a traditional shisha pipe">
  <defs>
    <radialGradient id="g3" cx="0.5" cy="0.6" r="0.7">
      <stop offset="0%" stop-color="#2B1A0C"/>
      <stop offset="60%" stop-color="#15100A"/>
      <stop offset="100%" stop-color="#0A0908"/>
    </radialGradient>
    <linearGradient id="vessel3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A2410"/>
      <stop offset="100%" stop-color="#1B1108"/>
    </linearGradient>
    <linearGradient id="numeral3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8C6E2A"/>
      <stop offset="50%" stop-color="#C9A24B"/>
      <stop offset="100%" stop-color="#8C6E2A"/>
    </linearGradient>
    <filter id="n3"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/><feColorMatrix values="0 0 0 0 0.86  0 0 0 0 0.69  0 0 0 0 0.39  0 0 0 0.06 0"/></filter>
  </defs>

  <rect width="800" height="800" fill="url(#g3)"/>
  <rect width="800" height="800" filter="url(#n3)" opacity="0.45"/>

  <!-- Stylized traditional vessel + stem + hose curve -->
  <g transform="translate(400, 420)">
    <!-- Glass vessel (bottle bulb) -->
    <path d="M -78 60 Q -90 -10 -50 -60 Q 0 -90 50 -60 Q 90 -10 78 60 Q 78 130 0 138 Q -78 130 -78 60 Z"
          fill="url(#vessel3)" opacity="0.92"/>
    <!-- Subtle highlight on bulb -->
    <ellipse cx="-30" cy="0" rx="14" ry="40" fill="#E6C97A" opacity="0.08"/>
    <!-- Stem -->
    <rect x="-12" y="-220" width="24" height="170" fill="#1F1408" opacity="0.95"/>
    <!-- Tray -->
    <rect x="-46" y="-230" width="92" height="14" fill="#C9A24B" opacity="0.18" rx="2"/>
    <!-- Bowl on top -->
    <ellipse cx="0" cy="-238" rx="24" ry="12" fill="#1F1408"/>
    <!-- Coal glow hint -->
    <ellipse cx="0" cy="-246" rx="14" ry="4" fill="#E6C97A" opacity="0.35"/>
    <!-- Hose curve -->
    <path d="M 30 30 Q 240 20 320 200" stroke="#1F1408" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M 30 30 Q 240 20 320 200" stroke="#C9A24B" stroke-width="0.8" fill="none" opacity="0.18" stroke-linecap="round"/>
    <!-- Mouthpiece tip -->
    <circle cx="328" cy="208" r="10" fill="#3A2410"/>
  </g>

  <!-- Numeral -->
  <text x="400" y="540" text-anchor="middle"
        font-family="Marcellus, 'Cormorant Garamond', serif" font-style="italic"
        font-size="280" fill="url(#numeral3)" opacity="0.18" letter-spacing="-6">03</text>

  <!-- Caption -->
  <g transform="translate(48, 740)">
    <line x1="0" y1="0" x2="32" y2="0" stroke="#C9A24B" stroke-width="1"/>
    <text x="42" y="6" font-family="Italiana, serif" font-size="18" letter-spacing="3" fill="#F4ECDA">PLACEHOLDER · SHISHA 03</text>
  </g>

  <text x="744" y="56" text-anchor="end" font-family="Marcellus, serif" font-style="italic" font-size="28" fill="#C9A24B" opacity="0.7" letter-spacing="-1">CM</text>
</svg>
